<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Dashboard grid lines -->
  <rect x="60" y="80" width="190" height="150" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="262" y="80" width="190" height="150" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="60" y="244" width="190" height="190" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="262" y="244" width="190" height="190" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Top-left: Heart rate line chart -->
  <polyline points="85,200 110,180 135,190 160,160 185,170 210,140 225,155" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="210" cy="140" r="5" fill="#00d2ff"/>
  <text x="90" y="115" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="20" font-weight="600">HRV</text>
  <text x="90" y="145" fill="white" font-family="system-ui" font-size="32" font-weight="700">64</text>
  <!-- Top-right: Readiness gauge -->
  <text x="290" y="115" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="20" font-weight="600">Score</text>
  <circle cx="357" cy="175" r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
  <circle cx="357" cy="175" r="42" fill="none" stroke="url(#green)" stroke-width="8" stroke-dasharray="210 265" stroke-linecap="round" transform="rotate(-90 357 175)"/>
  <text x="357" y="185" fill="white" font-family="system-ui" font-size="30" font-weight="700" text-anchor="middle">82</text>
  <!-- Bottom-left: Bar chart (training load) -->
  <text x="90" y="280" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="20" font-weight="600">Charge</text>
  <rect x="90" y="370" width="24" height="50" rx="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="122" y="340" width="24" height="80" rx="4" fill="url(#accent)" opacity="0.7"/>
  <rect x="154" y="355" width="24" height="65" rx="4" fill="url(#accent)" opacity="0.8"/>
  <rect x="186" y="320" width="24" height="100" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="218" y="350" width="24" height="70" rx="4" fill="url(#accent)"/>
  <!-- Bottom-right: Activity summary -->
  <text x="290" y="280" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="20" font-weight="600">Semaine</text>
  <rect x="290" y="300" width="140" height="30" rx="6" fill="url(#green)" opacity="0.2"/>
  <rect x="290" y="300" width="100" height="30" rx="6" fill="url(#green)" opacity="0.4"/>
  <text x="300" y="321" fill="white" font-family="system-ui" font-size="14" font-weight="500">Sport</text>
  <rect x="290" y="340" width="140" height="30" rx="6" fill="url(#accent)" opacity="0.2"/>
  <rect x="290" y="340" width="85" height="30" rx="6" fill="url(#accent)" opacity="0.4"/>
  <text x="300" y="361" fill="white" font-family="system-ui" font-size="14" font-weight="500">Travail</text>
  <rect x="290" y="380" width="140" height="30" rx="6" fill="url(#orange)" opacity="0.2"/>
  <rect x="290" y="380" width="60" height="30" rx="6" fill="url(#orange)" opacity="0.4"/>
  <text x="300" y="401" fill="white" font-family="system-ui" font-size="14" font-weight="500">Social</text>
</svg>
